services:
  - type: web
    name: amira
    runtime: python
    plan: free
    # Build the React UI, then install the Python backend. Node is available on
    # Render's Python runtime image for the UI build step.
    buildCommand: >-
      cd ui && npm ci && npm run build && cd ..
      && pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    # The normalized real-evidence dataset (dataset/) and benchmark (benchmark/)
    # are committed to the repo, so deployment serves the exact verified data
    # without depending on live NCBI / ClinicalTrials.gov calls at build time.
    # To refresh the corpus, run `python pipeline/ingest.py` locally and commit.
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: NODE_VERSION
        value: 20.11.1
