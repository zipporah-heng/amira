<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="brandB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5630ad"/>
      <stop offset="1" stop-color="#9b7bea"/>
    </linearGradient>
    <linearGradient id="verdict" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b1630"/>
      <stop offset="1" stop-color="#3b286b"/>
    </linearGradient>
    <filter id="shadowB" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="13" flood-color="#5630ad" flood-opacity="0.08"/>
    </filter>
    <style>
      .ui { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .ink { fill: #1b1630; }
      .copy { fill: #4a4463; }
      .muted { fill: #837c9c; }
      .purple { fill: #6a3fd0; }
      .green { fill: #1f7a5f; }
      .amber { fill: #8a6212; }
      .red { fill: #a63d63; }
      .eyebrow { font-size: 12px; font-weight: 750; letter-spacing: 1.35px; }
      .small { font-size: 13px; }
      .body { font-size: 16px; }
      .label { font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#faf9ff"/>
  <circle cx="1390" cy="5" r="210" fill="#f0ebfd"/>
  <circle cx="10" cy="900" r="210" fill="#eef7f5"/>

  <!-- App bar -->
  <rect width="1440" height="76" fill="#ffffff"/>
  <line x1="0" y1="76" x2="1440" y2="76" stroke="#ece8f8"/>
  <g class="ui">
    <rect x="60" y="20" width="38" height="38" rx="11" fill="url(#brandB)"/>
    <path d="M70 47 L79 29 L88 47 M74 41 H84" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="110" y="39" font-size="22" font-weight="780" class="ink">AMIRA</text>
    <text x="110" y="57" font-size="11.5" class="muted" letter-spacing=".35">EVIDENCE INTELLIGENCE PLATFORM</text>
    <rect x="1099" y="20" width="273" height="38" rx="19" fill="#ffffff" stroke="#dcd0f8"/>
    <circle cx="1122" cy="39" r="6" fill="#2f8f83"/>
    <text x="1137" y="44" font-size="13.5" font-weight="670" class="copy">Source-linked evidence view</text>
  </g>

  <g class="ui">
    <text x="60" y="113" class="purple small" font-weight="700">ROSUVASTATIN · CARDIOVASCULAR EVENT PREVENTION</text>
    <text x="60" y="156" font-size="34" font-weight="750" class="ink">Were women counted—or actually studied?</text>
    <text x="60" y="184" font-size="16.5" class="copy">Follow the evidence from enrolment to the questions that matter for women.</text>

    <!-- Journey connector -->
    <line x1="183" y1="247" x2="1257" y2="247" stroke="#ddd5f1" stroke-width="4" stroke-linecap="round"/>

    <!-- Step 1 -->
    <rect x="60" y="212" width="246" height="186" rx="18" fill="#ffffff" stroke="#cfe9e0" filter="url(#shadowB)"/>
    <circle cx="91" cy="247" r="16" fill="#1f7a5f"/>
    <text x="86.5" y="252" font-size="14" font-weight="780" fill="#fff">1</text>
    <text x="118" y="252" class="green eyebrow">COUNTED</text>
    <text x="88" y="303" font-size="31" font-weight="790" class="ink">6,801 women</text>
    <text x="88" y="331" class="copy body">explicitly reported in JUPITER</text>
    <rect x="88" y="352" width="82" height="25" rx="12.5" fill="#e9f6f1"/>
    <text x="106" y="369" class="green small" font-weight="720">Found ✓</text>

    <!-- Step 2 -->
    <rect x="324" y="212" width="246" height="186" rx="18" fill="#ffffff" stroke="#cfe9e0" filter="url(#shadowB)"/>
    <circle cx="355" cy="247" r="16" fill="#1f7a5f"/>
    <text x="350.5" y="252" font-size="14" font-weight="780" fill="#fff">2</text>
    <text x="382" y="252" class="green eyebrow">ANALYZED</text>
    <text x="352" y="303" font-size="26" font-weight="770" class="ink">Effectiveness</text>
    <text x="352" y="331" class="copy body">reported by sex in 1 of 2 trials</text>
    <rect x="352" y="352" width="120" height="25" rx="12.5" fill="#e9f6f1"/>
    <text x="370" y="369" class="green small" font-weight="720">Partly found ✓</text>

    <!-- Step 3 -->
    <rect x="588" y="212" width="246" height="186" rx="18" fill="#ffffff" stroke="#f0dfb9" filter="url(#shadowB)"/>
    <circle cx="619" cy="247" r="16" fill="#b07d1a"/>
    <text x="614.5" y="252" font-size="14" font-weight="780" fill="#fff">3</text>
    <text x="646" y="252" class="amber eyebrow">COMPARED</text>
    <text x="616" y="303" font-size="26" font-weight="770" class="ink">Women vs men</text>
    <text x="616" y="331" class="copy body">drug-specific comparison unclear</text>
    <rect x="616" y="352" width="90" height="25" rx="12.5" fill="#fbf4e6"/>
    <text x="635" y="369" class="amber small" font-weight="720">Unclear ?</text>

    <!-- Step 4 -->
    <rect x="852" y="212" width="246" height="186" rx="18" fill="#ffffff" stroke="#f0d9e2" filter="url(#shadowB)"/>
    <circle cx="883" cy="247" r="16" fill="#a63d63"/>
    <text x="878.5" y="252" font-size="14" font-weight="780" fill="#fff">4</text>
    <text x="910" y="252" class="red eyebrow">SAFETY</text>
    <text x="880" y="303" font-size="26" font-weight="770" class="ink">Side effects</text>
    <text x="880" y="331" class="copy body">not reported by sex</text>
    <rect x="880" y="352" width="115" height="25" rx="12.5" fill="#f9edf1"/>
    <text x="899" y="369" class="red small" font-weight="720">Missing ×</text>

    <!-- Step 5 -->
    <rect x="1116" y="212" width="264" height="186" rx="18" fill="#ffffff" stroke="#f0d9e2" filter="url(#shadowB)"/>
    <circle cx="1147" cy="247" r="16" fill="#a63d63"/>
    <text x="1142.5" y="252" font-size="14" font-weight="780" fill="#fff">5</text>
    <text x="1174" y="252" class="red eyebrow">HORMONAL CONTEXT</text>
    <text x="1144" y="303" font-size="24" font-weight="770" class="ink">Menopause + HT</text>
    <text x="1144" y="331" class="copy body">not reported in either trial</text>
    <rect x="1144" y="352" width="115" height="25" rx="12.5" fill="#f9edf1"/>
    <text x="1163" y="369" class="red small" font-weight="720">Missing ×</text>

    <!-- Verdict -->
    <rect x="60" y="423" width="1320" height="126" rx="20" fill="#1b1630"/>
    <text x="94" y="459" font-size="12" font-weight="760" fill="#c3aef0" letter-spacing="1.5">AMIRA'S PLAIN-LANGUAGE CONCLUSION</text>
    <text x="94" y="500" font-size="28" font-weight="760" fill="#fff">Women were counted. Some outcomes were analyzed. Key questions remain unanswered.</text>
    <text x="94" y="527" font-size="14.5" fill="#c9c4d8">This measures the maturity of women-specific reporting—not whether rosuvastatin is the best medicine.</text>

    <!-- Interpretation pane -->
    <rect x="60" y="575" width="750" height="257" rx="18" fill="#ffffff" stroke="#ece8f8" filter="url(#shadowB)"/>
    <text x="90" y="611" class="purple eyebrow">WHAT THIS MEANS</text>
    <text x="90" y="647" class="ink body" font-weight="700">One trial reported cardiovascular benefit in both women and men.</text>
    <text x="90" y="674" class="copy body">AMIRA did not find a clear drug-specific statistical test showing whether</text>
    <text x="90" y="698" class="copy body">the size of that benefit differed between women and men.</text>
    <text x="90" y="732" class="copy body">Neither trial provided enough reporting on safety by sex, menopause status,</text>
    <text x="90" y="756" class="copy body">or hormone therapy use.</text>
    <rect x="90" y="779" width="192" height="36" rx="9" fill="url(#brandB)"/>
    <text x="110" y="802" font-size="13.5" font-weight="720" fill="#fff">Open original studies ↗</text>
    <rect x="294" y="779" width="184" height="36" rx="9" fill="#ffffff" stroke="#c3aef0"/>
    <text x="316" y="802" font-size="13.5" font-weight="700" class="purple">Compare evidence →</text>

    <!-- Technical pane -->
    <rect x="830" y="575" width="550" height="257" rx="18" fill="#ffffff" stroke="#dcd0f8" filter="url(#shadowB)"/>
    <text x="860" y="611" class="purple eyebrow">EVIDENCE TRACE · FOR DEEP REVIEW</text>
    <text x="860" y="643" class="muted small">AMIRA maturity</text>
    <text x="1040" y="643" class="ink label">2/5 · Women analyzed</text>
    <line x1="860" y1="656" x2="1350" y2="656" stroke="#ece8f8"/>
    <text x="860" y="681" class="muted small">JUPITER</text>
    <text x="1040" y="681" class="ink small" font-weight="650">17,802 total · 6,801 women reported (38.2%)</text>
    <text x="860" y="711" class="muted small">HOPE-3</text>
    <text x="1040" y="711" class="ink small" font-weight="650">12,705 total · 46% women; exact count absent</text>
    <text x="860" y="741" class="muted small">Coverage</text>
    <text x="1040" y="741" class="ink small" font-weight="650">Effectiveness 1/2 · Safety 0/2</text>
    <text x="860" y="771" class="muted small">Hormonal context</text>
    <text x="1040" y="771" class="ink small" font-weight="650">Menopause 0/2 · Hormone therapy 0/2</text>
    <rect x="860" y="791" width="490" height="24" rx="7" fill="#f5f2fe"/>
    <text x="878" y="808" font-size="12.5" font-weight="680" class="purple">View maturity rules · assertions · exact passages · provenance →</text>

    <text x="60" y="872" class="muted small">AMIRA structures evidence for review. It does not diagnose, prescribe, or rank medicines by clinical effectiveness.</text>
    <text x="1242" y="872" class="purple small" font-weight="700">Every claim → source</text>
  </g>
</svg>
