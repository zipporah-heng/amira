<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="cBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5630ad"/>
      <stop offset="1" stop-color="#9b7bea"/>
    </linearGradient>
    <linearGradient id="cHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f2fe"/>
    </linearGradient>
    <style>
      .ui { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .ink { fill: #1b1630; }
      .copy { fill: #4a4463; }
      .muted { fill: #837c9c; }
      .purple { fill: #6a3fd0; }
      .green { fill: #1f7a5f; }
      .amber { fill: #8a6212; }
      .red { fill: #a63d63; }
      .eyebrow { font-size: 11px; font-weight: 760; letter-spacing: 1.25px; }
      .small { font-size: 13px; }
      .body { font-size: 16px; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#faf9ff"/>
  <circle cx="1380" cy="40" r="190" fill="#f0ebfd"/>
  <circle cx="20" cy="900" r="175" fill="#eef7f5"/>

  <!-- Header -->
  <rect width="1440" height="76" fill="#ffffff"/>
  <line x1="0" y1="76" x2="1440" y2="76" stroke="#ece8f8"/>
  <g class="ui">
    <rect x="52" y="20" width="38" height="38" rx="11" fill="url(#cBrand)"/>
    <path d="M62 47 L71 29 L80 47 M66 41 H76" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="102" y="39" font-size="22" font-weight="780" class="ink">AMIRA</text>
    <text x="102" y="57" font-size="11.5" class="muted" letter-spacing=".35">EVIDENCE INTELLIGENCE PLATFORM</text>

    <rect x="1055" y="19" width="325" height="40" rx="20" fill="#f5f2fe" stroke="#dcd0f8"/>
    <rect x="1059" y="23" width="144" height="32" rx="16" fill="#ffffff"/>
    <text x="1083" y="44" font-size="13.5" font-weight="720" class="purple">Easy to read</text>
    <text x="1233" y="44" font-size="13.5" font-weight="620" class="muted">Clinical details</text>
  </g>

  <g class="ui">
    <!-- Question -->
    <text x="52" y="111" class="purple small" font-weight="720">DIGOXIN · HEART FAILURE</text>
    <text x="52" y="151" font-size="32" font-weight="750" class="ink">What does the evidence say for a woman like my mother?</text>
    <rect x="52" y="169" width="230" height="29" rx="14.5" fill="#ece5fc"/>
    <text x="70" y="188" class="purple small" font-weight="680">Life stage: Postmenopause</text>
    <text x="298" y="188" class="muted small">AMIRA explains research. It does not tell anyone to start, stop, or change medicine.</text>

    <!-- Main answer -->
    <rect x="52" y="218" width="1336" height="172" rx="20" fill="url(#cHero)" stroke="#dcd0f8"/>
    <rect x="80" y="241" width="151" height="23" rx="11.5" fill="#ece5fc"/>
    <circle cx="94" cy="252.5" r="3.8" fill="#6a3fd0"/>
    <text x="106" y="257" class="purple eyebrow">AMIRA'S SHORT ANSWER</text>
    <text x="80" y="300" font-size="27" font-weight="770" class="ink">Women were included. A later analysis raised a serious warning signal.</text>
    <text x="80" y="336" font-size="18.5" class="copy">In the historical analysis, about <tspan font-weight="780" fill="#1b1630">1 in 3 women assigned digoxin died during follow-up</tspan></text>
    <text x="80" y="364" font-size="15" fill="#705013">33.1% with digoxin versus 28.9% with placebo. This was a later subgroup analysis and does not prove digoxin caused every death.</text>

    <line x1="1065" y1="241" x2="1065" y2="367" stroke="#e2dcf1"/>
    <text x="1095" y="259" class="muted eyebrow">OVERALL EVIDENCE PICTURE</text>
    <text x="1095" y="298" font-size="27" font-weight="770" fill="#8a6212">Mixed</text>
    <text x="1095" y="326" class="copy small">Historical warning signal</text>
    <text x="1095" y="348" class="copy small">Newer low-dose evidence</text>
    <text x="1095" y="370" class="red small">Menopause evidence missing</text>

    <!-- Five questions -->
    <text x="52" y="425" class="muted eyebrow">FIVE QUESTIONS ANYONE CAN UNDERSTAND</text>

    <rect x="52" y="443" width="252" height="178" rx="17" fill="#ffffff" stroke="#cfe9e0"/>
    <circle cx="80" cy="472" r="15" fill="#1f7a5f"/>
    <text x="75.5" y="477" font-size="13" font-weight="780" fill="#fff">1</text>
    <text x="105" y="477" class="green eyebrow">WERE WOMEN INCLUDED?</text>
    <text x="80" y="520" font-size="23" font-weight="760" class="green">Yes</text>
    <text x="80" y="549" class="copy small">1,519 women were included in</text>
    <text x="80" y="570" class="copy small">the 6,800-person trial.</text>
    <rect x="80" y="586" width="81" height="23" rx="11.5" fill="#e9f6f1"/>
    <text x="98" y="602" class="green small" font-weight="700">Found ✓</text>

    <rect x="322" y="443" width="252" height="178" rx="17" fill="#ffffff" stroke="#f0dfb9"/>
    <circle cx="350" cy="472" r="15" fill="#b07d1a"/>
    <text x="345.5" y="477" font-size="13" font-weight="780" fill="#fff">2</text>
    <text x="375" y="477" class="amber eyebrow">WERE WOMEN ANALYZED?</text>
    <text x="350" y="520" font-size="23" font-weight="760" class="amber">Later</text>
    <text x="350" y="549" class="copy small">The women-specific analysis</text>
    <text x="350" y="570" class="copy small">came after the original report.</text>
    <rect x="350" y="586" width="128" height="23" rx="11.5" fill="#fbf4e6"/>
    <text x="364" y="602" class="amber small" font-weight="700">Later analysis</text>

    <rect x="592" y="443" width="252" height="178" rx="17" fill="#ffffff" stroke="#f0d9e2"/>
    <circle cx="620" cy="472" r="15" fill="#a63d63"/>
    <text x="615.5" y="477" font-size="13" font-weight="780" fill="#fff">3</text>
    <text x="645" y="477" class="red eyebrow">WHAT DID IT FIND?</text>
    <text x="620" y="520" font-size="23" font-weight="760" class="red">A warning signal</text>
    <text x="620" y="549" class="copy small">Women who died: 33.1% versus</text>
    <text x="620" y="570" class="copy small">28.9% with placebo.</text>
    <rect x="620" y="586" width="119" height="23" rx="11.5" fill="#f9edf1"/>
    <text x="638" y="602" class="red small" font-weight="700">Review closely</text>

    <rect x="862" y="443" width="252" height="178" rx="17" fill="#ffffff" stroke="#cfe9e0"/>
    <circle cx="890" cy="472" r="15" fill="#2f8f83"/>
    <text x="885.5" y="477" font-size="13" font-weight="780" fill="#fff">4</text>
    <text x="915" y="477" class="green eyebrow">IS THERE NEWER EVIDENCE?</text>
    <text x="890" y="520" font-size="23" font-weight="760" fill="#2f8f83">Yes</text>
    <text x="890" y="549" class="copy small">Low-dose trial: 284 women.</text>
    <text x="890" y="570" class="copy small">No clear sex difference found.</text>
    <rect x="890" y="586" width="124" height="23" rx="11.5" fill="#e9f6f1"/>
    <text x="908" y="602" class="green small" font-weight="700">Open evidence →</text>

    <rect x="1132" y="443" width="256" height="178" rx="17" fill="#ffffff" stroke="#f0d9e2"/>
    <circle cx="1160" cy="472" r="15" fill="#a63d63"/>
    <text x="1155.5" y="477" font-size="13" font-weight="780" fill="#fff">5</text>
    <text x="1185" y="477" class="red eyebrow">DOES IT FIT HER LIFE STAGE?</text>
    <text x="1160" y="520" font-size="23" font-weight="760" class="red">We do not know</text>
    <text x="1160" y="549" class="copy small">Menopause and hormone therapy</text>
    <text x="1160" y="570" class="copy small">were not reported.</text>
    <rect x="1160" y="586" width="99" height="23" rx="11.5" fill="#f9edf1"/>
    <text x="1178" y="602" class="red small" font-weight="700">Missing ×</text>

    <!-- Bottom cards -->
    <rect x="52" y="647" width="514" height="176" rx="18" fill="#ffffff" stroke="#dcd0f8"/>
    <text x="80" y="678" class="purple eyebrow">ANOTHER EVIDENCE PATH TO REVIEW</text>
    <text x="80" y="711" font-size="21" font-weight="750" class="ink">Dapagliflozin</text>
    <text x="80" y="738" class="copy small">DAPA-HF studied 1,109 women. Researchers did not find</text>
    <text x="80" y="759" class="copy small">evidence that it worked differently in women and men.</text>
    <text x="80" y="784" class="muted small">Not directly compared with digoxin · Not a prescribing recommendation</text>
    <text x="415" y="807" class="purple small" font-weight="720">Review this evidence →</text>

    <rect x="584" y="647" width="390" height="176" rx="18" fill="#fffaf1" stroke="#f0dfb9"/>
    <text x="612" y="678" class="amber eyebrow">HOW OFTEN IS IT PRESCRIBED?</text>
    <text x="612" y="713" font-size="20" font-weight="750" class="ink">Not available in AMIRA yet</text>
    <text x="612" y="741" class="copy small">Trial enrolment is not prescription volume.</text>
    <text x="612" y="762" class="copy small">This requires a separate real-world dataset</text>
    <text x="612" y="783" class="copy small">for a specific country and time period.</text>
    <text x="612" y="807" class="amber small" font-weight="700">Never inferred from study size</text>

    <rect x="992" y="647" width="396" height="176" rx="18" fill="#ffffff" stroke="#dcd0f8"/>
    <text x="1020" y="678" class="purple eyebrow">FOR CLINICIANS AND RESEARCHERS</text>
    <text x="1020" y="710" class="copy small">Open mortality rates, adjusted hazard ratios,</text>
    <text x="1020" y="731" class="copy small">confidence intervals, serum concentration,</text>
    <text x="1020" y="752" class="copy small">methodology, and exact source passages.</text>
    <rect x="1020" y="773" width="182" height="36" rx="9" fill="url(#cBrand)"/>
    <text x="1041" y="796" font-size="13.5" font-weight="720" fill="#fff">Open clinical details →</text>
    <text x="1217" y="796" class="purple small" font-weight="700">Sources ↗</text>

    <text x="52" y="869" class="muted small">Do not start, stop, or change medication based on AMIRA alone. Discuss treatment decisions with a qualified clinician.</text>
    <text x="1224" y="869" class="purple small" font-weight="720">Every claim → source</text>
  </g>
</svg>
